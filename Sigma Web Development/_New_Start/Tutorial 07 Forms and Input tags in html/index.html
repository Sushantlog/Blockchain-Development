<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms Let's Learn</title>
</head>
<body>
    <form action="post">
        <h1>Forms Create The Understanding The concept</h1>
        <label for="fname">First Name : </label>
        <input type="text" id="fname" name="fname" placeholder="Enter You First Name">
        <label for="lname">Last Name : </label>
        <input type="text" id="lname" name="lname" placeholder="Enter Your Last Name">

        <div>
            <input type="radio" id="male" name="gender" value="male">
            <label for="male">Male</label>
            <input type="radio" id="female" name="gender" value="female">
            <label for="female">Female</label>
        </div>

        <div>
            <input type="checkbox" id="subscribe" name="subscribe" value="yes">
            <label for="subscribe">Subscribe to Newsletter</label>
        </div>

        <div>
            <label for="comment">Enter your comment</label>
            <br>
            <textarea name="comment" id="comment" cols="25" rows="5"></textarea>
        </div>

        <div>
            <select name="fruits">
                <option value="apple">Apple</option>
                <option value="banana">Banana</option>
                <option value="cherry">Cherry</option>
            </select>
        </div>

        <div>
            <fieldset>
                <legend>Contact Information</legend>
                <label for="email">Email : </label>
                <input type="email" id="email" name="email" placeholder="Enter Your Email">
                <label for="phone">Phone : </label>
                <input type="tel" id="phone" name="phone" placeholder="Enter Your Phone Number">
            </fieldset>
        </div>
    </form>
</body>
</html>
