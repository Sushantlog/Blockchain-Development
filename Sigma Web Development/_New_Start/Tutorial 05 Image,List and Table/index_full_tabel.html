<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Full Table</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <table>
            <caption>
                Student Information
            </caption>
            <thead>
                <tr>
                    <th>Student ID</th>
                    <th>Student Name</th>
                    <th>Student Age</th>
                    <th>Student City</th>
                    <th>Student Grade</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>1</td>
                    <td>Sushant</td>
                    <td>24</td>
                    <td>Kowad</td>
                    <td rowspan="2">A++</td>
                </tr>
                <tr>
                    <td>2</td>
                    <td>Rahul</td>
                    <td>24</td>
                    <td>Kowad</td>
                </tr>
            </tbody>
            <tfoot>
                <tr>
                    <td colspan="5">End of the table</td>
                </tr>
            </tfoot>
        </table>
    </body>
</html>
