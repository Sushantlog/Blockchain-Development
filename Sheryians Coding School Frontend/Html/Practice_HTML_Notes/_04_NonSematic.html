<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- HTML5 NON SEMANTIC ELEMENTS -->
    <!-- Non-semantic elements do not provide any meaning or structure to the content. They are mainly used for styling and layout purposes. -->
    
    <!-- 1. <div> (Division)
        A block-level element used as a container for grouping elements.
        It does not have any predefined meaning.
        Often used with CSS for styling. -->
    <div style="background-color: lightblue; padding: 10PX;">
        <h2>Welcome to My Website</h2>
        <p>This is a Section inside a div.</p>
    </div>

    <!-- 2. <span> (Inline Container)
        An inline container used for styling a small part of text.
        Commonly used inside paragraphs. -->
    <p>This is an <span style="color: red;">Importance</span> message.</p>
</body>
</html>
