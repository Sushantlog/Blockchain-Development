<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <h2>HTML Input Example</h2>

    <form action="#" method="post">
        <label for="text">Text : </label>
        <input type="text" name="text" id="text" placeholder="Enter The Name ">

        <label for="password">Password : </label>
        <input type="password" name="password" id="password" placeholder="password">

        <label for="email">Email : </label>
        <input type="email" name="email" id="email" placeholder="email@gmail.com">

        <label for="tel">Phone Number : </label>
        <input type="tel" name="tel" id="tel" placeholder="123-456-7890">

        <label for="url">Website URL: </label>
        <input type="url" name="url" id="url" placeholder="https://example.com">

        <label for="date">Date : </label>
        <input type="date" name="date" id="date">

        <label for="datetime">Date & Time : </label>
        <input type="datetime" name="datetime" id="datetime">

        <label for="time">Time : </label>
        <input type="time" name="time" id="time">

        <label for="month">Month : </label>
        <input type="month" name="month" id="month">

        <label for="week">Week : </label>
        <input type="week" name="week" id="week">

        <label for="number">Number : </label>
        <input type="number" name="number" id="number" min="1" max="100">

        <label for="range">Range (1-100) : </label>
        <input type="range" name="range" id="range" min="1" max="100">

        <label for="">CheckBox :</label>
        <input type="checkbox" name="agree" id="agree"> I Agree

        <label for="">Radio Button : </label>
        <input type="radio" name="radio-group" id="option1" value="Option1">Option 1
        <input type="radio" name="radio-group" id="option2" value="Option2">Option 2

        <label for="color">Choose a Color : </label>
        <input type="color" name="color" id="color">

        <label for="file">Upload File : </label>
        <input type="file" name="file" id="file">

        <input type="hidden" name="hiddenField" value="secret">

        <label for="search">Search : </label>
        <input type="search" name="search" id="search" placeholder="Search here...">

        <div class="submit-reset">
            <button type="submit">Submit</button>
            <button type="reset">Reset</button>
        </div>
    </form>

</body>
</html>
